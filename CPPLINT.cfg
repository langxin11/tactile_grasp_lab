# Google C++ Style 检查配置（cpplint）。
# 仓库内代码遵守 Google 风格，但部分检查与 ROS2 / 上游 SDK 习惯冲突，这里整体放宽。

set noparent
linelength=100

# legal/copyright       —— 不要求每个文件强制带版权头（ROS2 包习惯把许可写在 package.xml）
# build/include_subdir  —— ROS2 允许同包内 #include "foo.hpp" 不带子目录
# build/c++11           —— 已用 C++17 编译，cpplint 老建议无意义
# runtime/references    —— ROS2 / 旧式 API 大量用非 const 引用传参，先放过
# whitespace/braces     —— 与 clang-format 偶有冲突，由 clang-format 兜底
filter=-legal/copyright,-build/include_subdir,-build/c++11,-runtime/references,-whitespace/braces

# 上游 PTSDK 头文件与 ROS2 自动生成代码不参与风格检查
exclude_files=ros2_ws/src/papillarray_ros2_v2/lib/.*
exclude_files=ros2_ws/src/buttonsensor_ros2_v1/lib/.*
exclude_files=ros2_ws/build/.*
exclude_files=ros2_ws/install/.*
exclude_files=ros2_ws/log/.*
exclude_files=vendor/.*
