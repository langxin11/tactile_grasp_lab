tactile_grasp_controller:
  ros__parameters:
    # 真机覆盖项：
    # 在基础配置 tactile_grasp_controller.yaml 之上叠加这些参数。
    dry_run: false

    # 真机抓取当前试验频率为 50 Hz，用于提高力带调节的刷新率；
    # 基础配置仍保留 40 Hz，避免把所有场景默认一起抬高。
    control_rate_hz: 50.0

    # 真机默认先用目标 10 N、±1 N 死区的双向保持。
    target_hold_force_n: 10.0
    hold_force_deadband_n: 1.0
    release_position_step: 1
