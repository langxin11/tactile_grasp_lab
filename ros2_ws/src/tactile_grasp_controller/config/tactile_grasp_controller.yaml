tactile_grasp_controller:
  ros__parameters:
    # 触觉输入 topic：
    # 默认与 papillarray_ros2_v2 的命名保持一致：
    # /hub_<hub_id>/sensor_<sensor_id>
    # 这里假设左传感器是 sensor_0，右传感器是 sensor_1。
    left_tactile_topic: "/hub_0/sensor_0"
    right_tactile_topic: "/hub_0/sensor_1"

    # 兼容路径：保留标准 GripperCommand action 作为初始化和手工控制入口。
    gripper_command_action: "/robotiq_gripper_controller/gripper_cmd"
    # 闭环主路径：controller 通过 streaming topic 持续刷新位置和建议速度。
    streaming_command_topic: "/robotiq/command/stream"
    gripper_open_position: 0.0
    gripper_closed_position: 0.8
    gripper_max_effort: 10.0
    wait_for_action_server_s: 2.0

    # legacy 接口：仅用于旧 robotiq_2f85_driver 回退路径。
    gripper_command_topic: "/robotiq/command/position"
    gripper_command_echo_topic: "/robotiq/command/echo"

    # 调试输出：
    # debug 适合看连续特征，state 适合看状态迁移。
    debug_topic: "/tactile_grasp/debug"
    state_topic: "/tactile_grasp/state"

    # 运行频率：
    # 当前真机闭环默认推荐 40 Hz。
    # 现阶段不建议直接上 100 Hz。
    control_rate_hz: 40.0

    # 速度建议映射：
    # requested_rate = step * control_rate_hz
    # 当 requested_rate 达到 target_command_rate_bytes_per_s 时，
    # streaming 速度映射会饱和到 max_speed_byte。
    target_command_rate_bytes_per_s: 80.0
    min_speed_byte: 8
    max_speed_byte: 32

    # auto_start:
    # false 时节点启动后停在 IDLE，需要手工调用 /tactile_grasp/start。
    auto_start: false

    # 安全默认值：
    # true 时 controller 会照常算特征和状态机，但不会真的发夹爪命令。
    dry_run: true
    require_clear_tactile_on_start: true
    start_force_threshold_n: 5.0

    # 左右触觉消息超时时间。
    # 任一侧长时间没新数据，controller 会进入 FAULT。
    tactile_timeout_s: 0.2

    # 法向力符号：
    # 这里默认认为 gfz 正方向就是法向压入力。
    # 真机前必须根据安装方向标定 left_normal_sign / right_normal_sign。
    left_normal_sign: 1.0
    right_normal_sign: 1.0

    # 位置步进：
    # approach 用于接触前慢速闭合；
    # preload 用于建立最小预紧；
    # compensate 用于滑移或摩擦裕度不足时的小步补夹。
    approach_position_step: 1
    preload_position_step: 1
    compensate_position_step: 1

    # 命令位置边界：
    # initial_position 是 controller 对“当前命令位置”的初始估计，不是真实反馈。
    min_position: 0
    max_position: 255
    initial_position: 0

    # 力阈值，单位 N：
    # min_preload_force_n：进入 HOLD 前要求达到的最小预紧力
    # min_hold_force_n：保持阶段的最低法向力
    # max_safe_force_n：超过后进入超力保护判断
    # max_safe_force_consecutive_frames：连续多少帧超限才进入 FAULT
    min_preload_force_n: 3.0
    min_hold_force_n: 2.0
    max_safe_force_n: 20.0
    max_safe_force_consecutive_frames: 3

    # 摩擦估计：
    # friction_est 异常、缺失或太小的时候，退回 friction_mu_default。
    friction_mu_default: 0.4
    friction_mu_min: 0.2

    # 摩擦裕度阈值：
    # friction_margin = mu_est * fn_min - ft_max
    # 低于该值时，认为可能需要补夹。
    friction_margin_threshold_n: 0.5

    # 滑移补夹冷却时间：
    # 避免每个控制周期都连续补夹。
    slip_compensate_cooldown_s: 0.3

    # fault_action:
    # 当前支持 hold 或 open。
    # 第一版默认 hold，更保守。
    fault_action: "hold"
